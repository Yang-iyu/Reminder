name: Heartbeat Test (cron)

on:
  schedule:
    - cron: "*/1 * * * *"   # 每分钟执行一次
  workflow_dispatch:

env:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 允许写入文件

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write heartbeat
        run: |
          echo "Heartbeat at $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > heartbeat.txt

      - name: Commit heartbeat
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add heartbeat.txt
          git commit -m "Update heartbeat" || true
          git push || true
