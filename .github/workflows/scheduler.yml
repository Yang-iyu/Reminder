name: URL Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"   # 每分钟检查一次
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Execute due tasks
        run: |
          if [ ! -f tasks.json ]; then
            echo "tasks.json not found, skip."
            exit 0
          fi

          now_minute=$(date +%M)
          now_hour=$(date +%H)
          now_weekday=$(date +%u)  # 1=Monday ... 7=Sunday

          echo "Current time: $now_hour:$now_minute, weekday: $now_weekday"

          jq -c '.[] | select(.enabled == true)' tasks.json | while read task; do
            id=$(echo "$task" | jq -r '.id')
            url=$(echo "$task" | jq -r '.url')
            remark=$(echo "$task" | jq -r '.remark')
            minute=$(echo "$task" | jq -r '.minute')
            hour=$(echo "$task" | jq -r '.hour')
            weekday=$(echo "$task" | jq -r '.weekday')  # null 或 1-7

            # 比较时间
            if [ "$minute" = "$now_minute" ] && [ "$hour" = "$now_hour" ]; then
              if [ "$weekday" = "null" ] || [ "$weekday" = "$now_weekday" ]; then
                echo "==> Executing task: $id | $remark | $url"
                curl -L --max-time 20 "$url" || echo "Request failed for $url"
              else
                echo "Skip $id (weekday not match)"
              fi
            else
              echo "Skip $id (time not match)"
            fi
          done
