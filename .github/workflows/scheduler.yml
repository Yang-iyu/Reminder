name: URL Scheduler (cron + logs)

on:
  schedule:
    - cron: "*/1 * * * *"   # 每分钟检查一次
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 关键：允许写入日志

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install cron-parser
        run: npm install cron-parser

      - name: Run scheduler
        run: |
          node << 'EOF'
          const fs = require('fs');
          const parser = require('cron-parser');

          const tasks = JSON.parse(fs.readFileSync('tasks.json', 'utf8'));
          const now = new Date();

          function shouldRun(cronExpr) {
            try {
              const interval = parser.parseExpression(cronExpr, { currentDate: now });
              const prev = interval.prev();
              const diff = now - prev;
              return diff >= 0 && diff < 60000;
            } catch (e) {
              console.log("Cron 解析失败:", cronExpr, e.message);
              return false;
            }
          }

          if (!fs.existsSync('logs')) fs.mkdirSync('logs');

          tasks.forEach(task => {
            if (!task.enabled) return;

            if (shouldRun(task.cron)) {
              console.log(`==> 执行任务 ${task.id}: ${task.url}`);

              const { execSync } = require('child_process');
              try {
                const output = execSync(`curl -L --max-time 20 "${task.url}"`, { encoding: 'utf8' });
                fs.appendFileSync(`logs/${task.id}.log`,
                  `[${now.toISOString()}] SUCCESS\n${output}\n\n`
                );
              } catch (err) {
                fs.appendFileSync(`logs/${task.id}.log`,
                  `[${now.toISOString()}] FAILED\n${err}\n\n`
                );
              }
            }
          });
          EOF

      - name: Commit logs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add logs/*.log || true
          git commit -m "Update logs" || true
          git push || true

  cleanup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cleanup old logs
        run: |
          find logs -type f -mtime +30 -delete || true

      - name: Commit cleanup
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add logs || true
          git commit -m "Cleanup old logs" || true
          git push || true
